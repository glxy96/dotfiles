# ============================================
# tmux.conf
# 方針: デフォルトから大きく逸脱しない最小構成
#       + nvim と競合しないための必須チューニング
# ============================================

# --- 端末色・nvim 親和性 ---
# 内側の端末を 256色対応に
set -g default-terminal "tmux-256color"
# 外側の端末 (ghostty等) が True Color 対応なので RGB を伝える
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",ghostty:RGB"

# nvim で ESC 押下後の遅延を除去 (デフォルト 500ms → 0)
set -sg escape-time 0

# nvim の autoread / gitsigns 等がフォーカス切替を検知できるように
set -g focus-events on

# --- 操作性 ---
# マウス操作 (スクロール/ペイン選択/リサイズ) を有効化
set -g mouse on

# ウィンドウ/ペイン番号を 1 始まりに (キーボード数字列の並びと一致)
set -g base-index 1
setw -g pane-base-index 1
# ウィンドウを閉じた時に番号を詰める
set -g renumber-windows on

# スクロールバック行数 (Claude Code の長い出力を遡れるように)
set -g history-limit 50000

# --- キーバインド (デフォルト踏襲、最小限の追加のみ) ---
# prefix はデフォルトの C-b のまま

# prefix + r で設定リロード
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# --- ステータスバー (控えめ) ---
set -g status-position bottom
set -g status-interval 5
set -g status-left  "#[bold] #S #[default]| "
set -g status-right "%Y-%m-%d %H:%M "
set -g status-left-length 30
